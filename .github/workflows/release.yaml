name: Publish to PyPI and Create GitHub Release

on:
  # Trigger when a new release is created
  release:
    types:
      - created

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code from the repository
      - name: Check out code
        uses: actions/checkout@v3

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.x  # Use Python 3.x

      # Step 3: Upgrade pip and install dependencies for building and publishing
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install setuptools wheel twine

      # Step 4: Build the package
      - name: Build the package
        run: |
          python3 setup.py sdist bdist_wheel

      # Step 5: Upload the package to PyPI
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USER }}
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python3 -m twine upload dist/*

      # Step 6: Create GitHub Release (optional)
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body: "Automated release for version ${{ github.event.release.tag_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
